<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเขียนคำสั่งควบคุมหุ่นยนต์ PRO V2.5</title>
    <!-- โหลด Tailwind CSS ผ่าน CDN สำหรับตกแต่งหน้าเว็บ พร้อมตั้งค่า Dark Mode -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
        
        /* ซ่อน Scrollbar เล็กน้อยเพื่อความสวยงาม */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* สไตล์ Scrollbar สำหรับ Dark Mode */
        .dark ::-webkit-scrollbar-track { background: #1e293b; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-slate-900 p-4 sm:p-6 text-slate-800 dark:text-slate-100 transition-colors duration-200">
    <!-- ขยายความกว้างสูงสุดให้รองรับ 3 คอลัมน์ -->
    <div class="max-w-[1500px] w-full mx-auto space-y-6 relative">
        
        <!-- ส่วนหัวเรื่อง -->
        <header class="text-center space-y-2 mb-8 relative pt-4">
            <!-- ปุ่มสลับโหมดกลางวัน/กลางคืน -->
            <div class="absolute right-0 top-0">
                <button id="theme-toggle-btn" onclick="toggleTheme()" class="p-2 text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-full transition-colors" title="สลับโหมดกลางวัน/กลางคืน">
                    <!-- Icon จะถูกวาดด้วย JS -->
                </button>
            </div>

            <h1 class="text-3xl font-bold text-slate-800 dark:text-slate-100 flex items-center justify-center gap-3">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-600 dark:text-blue-400"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M12 8v4"/><path d="M8 12h0"/><path d="M16 12h0"/><path d="M9 16h6"/></svg>
                Robot Controller PRO
            </h1>
            <p class="text-slate-500 dark:text-slate-400">เรียงคำสั่งและกด "จำลองบนกระดาน" หรือ "ส่งให้หุ่นยนต์จริง"</p>
        </header>

        <!-- โครงสร้างหลัก 3 คอลัมน์ -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
            
            <!-- ================= พาเนลซ้าย (3/12): คำสั่งและการตั้งค่า ================= -->
            <div class="lg:col-span-3 space-y-6">
                
                <!-- 1. ปุ่มเพิ่มคำสั่ง -->
                <div class="bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 transition-colors">
                    <h2 class="text-base font-semibold text-slate-700 dark:text-slate-200 mb-4 flex items-center gap-2">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-500"><path d="M12 5v14M5 12h14"/></svg>
                        เพิ่มคำสั่ง
                    </h2>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="addCommand('FORWARD')" class="cmd-btn flex flex-col items-center justify-center gap-1.5 p-3 bg-blue-50 dark:bg-blue-900/20 hover:bg-blue-100 dark:hover:bg-blue-900/40 text-blue-700 dark:text-blue-300 border border-blue-200 dark:border-blue-800 rounded-xl transition-colors disabled:opacity-50 active:scale-95 font-medium text-sm">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg> 
                            เดินหน้า
                        </button>
                        <button onclick="addCommand('BACKWARD')" class="cmd-btn flex flex-col items-center justify-center gap-1.5 p-3 bg-orange-50 dark:bg-orange-900/20 hover:bg-orange-100 dark:hover:bg-orange-900/40 text-orange-700 dark:text-orange-300 border border-orange-200 dark:border-orange-800 rounded-xl transition-colors disabled:opacity-50 active:scale-95 font-medium text-sm">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg> 
                            ถอยหลัง
                        </button>
                        <button onclick="addCommand('TURN_LEFT')" class="cmd-btn flex flex-col items-center justify-center gap-1.5 p-3 bg-purple-50 dark:bg-purple-900/20 hover:bg-purple-100 dark:hover:bg-purple-900/40 text-purple-700 dark:text-purple-300 border border-purple-200 dark:border-purple-800 rounded-xl transition-colors disabled:opacity-50 active:scale-95 font-medium text-sm">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg> 
                            หมุนซ้าย
                        </button>
                        <button onclick="addCommand('TURN_RIGHT')" class="cmd-btn flex flex-col items-center justify-center gap-1.5 p-3 bg-pink-50 dark:bg-pink-900/20 hover:bg-pink-100 dark:hover:bg-pink-900/40 text-pink-700 dark:text-pink-300 border border-pink-200 dark:border-pink-800 rounded-xl transition-colors disabled:opacity-50 active:scale-95 font-medium text-sm">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg> 
                            หมุนขวา
                        </button>
                        <button onclick="addCommand('SLIDE_LEFT')" class="cmd-btn flex flex-col items-center justify-center gap-1.5 p-3 bg-cyan-50 dark:bg-cyan-900/20 hover:bg-cyan-100 dark:hover:bg-cyan-900/40 text-cyan-700 dark:text-cyan-300 border border-cyan-200 dark:border-cyan-800 rounded-xl transition-colors disabled:opacity-50 active:scale-95 font-medium text-sm">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg> 
                            สไลด์ซ้าย
                        </button>
                        <button onclick="addCommand('SLIDE_RIGHT')" class="cmd-btn flex flex-col items-center justify-center gap-1.5 p-3 bg-sky-50 dark:bg-sky-900/20 hover:bg-sky-100 dark:hover:bg-sky-900/40 text-sky-700 dark:text-sky-300 border border-sky-200 dark:border-sky-800 rounded-xl transition-colors disabled:opacity-50 active:scale-95 font-medium text-sm">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg> 
                            สไลด์ขวา
                        </button>
                        <button onclick="addCommand('CHECK_WALL')" class="cmd-btn flex flex-col items-center justify-center gap-1.5 p-3 bg-amber-50 dark:bg-amber-900/20 hover:bg-amber-100 dark:hover:bg-amber-900/40 text-amber-700 dark:text-amber-300 border border-amber-200 dark:border-amber-800 rounded-xl transition-colors disabled:opacity-50 active:scale-95 font-medium text-sm">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16"/><path d="M12 2v16"/><path d="m8 14 4 4 4-4"/></svg>
                            เช็คกำแพง
                        </button>
                        <button onclick="addCommand('DISPENSE')" class="cmd-btn flex flex-col items-center justify-center gap-1.5 p-3 bg-teal-50 dark:bg-teal-900/20 hover:bg-teal-100 dark:hover:bg-teal-900/40 text-teal-700 dark:text-teal-300 border border-teal-200 dark:border-teal-800 rounded-xl transition-colors disabled:opacity-50 active:scale-95 font-bold text-sm">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                            จ่ายวัตถุ
                        </button>
                    </div>
                </div>

                <!-- 2. ส่วนการตั้งค่าพารามิเตอร์ (ปรับค่าตั้งต้นเป็น 10.00 และคงค่าแสงไว้) -->
                <div class="bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 transition-colors">
                    <h2 class="text-base font-semibold text-slate-700 dark:text-slate-200 mb-4 flex items-center gap-2">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-500 dark:text-slate-400"><path d="M12 20a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"/><path d="M12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                        Hardware Setup
                    </h2>
                    
                    <!-- ส่วนเชื่อมต่อ -->
                    <div class="flex items-center justify-between mb-4 pb-4 border-b border-slate-100 dark:border-slate-700 transition-colors">
                        <div class="flex items-center gap-2">
                            <div id="status-indicator" class="w-3 h-3 rounded-full bg-slate-300 dark:bg-slate-600 transition-colors"></div>
                            <span id="connection-status" class="text-sm font-medium text-slate-600 dark:text-slate-300 transition-colors">ยังไม่เชื่อมต่อ</span>
                        </div>
                        <button id="connect-btn" onclick="connectArduino()" class="text-xs flex items-center gap-1.5 px-3 py-2 bg-slate-800 dark:bg-slate-700 hover:bg-slate-700 dark:hover:bg-slate-600 text-white rounded-lg transition-colors disabled:opacity-50">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m8 17 4 4 4-4"/></svg>
                            เชื่อมต่อ
                        </button>
                    </div>

                    <!-- ส่วนตั้งค่าพารามิเตอร์ (ปรับกลับเป็น 10.00) -->
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[11px] font-medium text-slate-500 dark:text-slate-400 mb-1">เดินหน้า (F)</label>
                            <input type="number" id="param-f" value="10.00" step="0.01" class="w-full p-2 border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-100 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none font-mono transition-colors">
                        </div>
                        <div>
                            <label class="block text-[11px] font-medium text-slate-500 dark:text-slate-400 mb-1">ถอยหลัง (B)</label>
                            <input type="number" id="param-b" value="10.00" step="0.01" class="w-full p-2 border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-100 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none font-mono transition-colors">
                        </div>
                        <div>
                            <label class="block text-[11px] font-medium text-slate-500 dark:text-slate-400 mb-1">หมุนซ้าย (L)</label>
                            <input type="number" id="param-l" value="90.00" step="0.01" class="w-full p-2 border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-100 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none font-mono transition-colors">
                        </div>
                        <div>
                            <label class="block text-[11px] font-medium text-slate-500 dark:text-slate-400 mb-1">หมุนขวา (R)</label>
                            <input type="number" id="param-r" value="90.00" step="0.01" class="w-full p-2 border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-100 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none font-mono transition-colors">
                        </div>
                        <div>
                            <label class="block text-[11px] font-medium text-slate-500 dark:text-slate-400 mb-1">สไลด์ซ้าย (SL)</label>
                            <input type="number" id="param-sl" value="10.00" step="0.01" class="w-full p-2 border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-100 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none font-mono transition-colors">
                        </div>
                        <div>
                            <label class="block text-[11px] font-medium text-slate-500 dark:text-slate-400 mb-1">สไลด์ขวา (SR)</label>
                            <input type="number" id="param-sr" value="10.00" step="0.01" class="w-full p-2 border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-100 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none font-mono transition-colors">
                        </div>
                        <div>
                            <label class="block text-[11px] font-medium text-slate-500 dark:text-slate-400 mb-1">เช็คกำแพง (CW)</label>
                            <input type="number" id="param-cw" value="10.00" step="0.01" class="w-full p-2 border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-100 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none font-mono transition-colors">
                        </div>
                        <div>
                            <label class="block text-[11px] font-medium text-slate-500 dark:text-slate-400 mb-1">ค่าแสง (LGT)</label>
                            <input type="number" id="param-light" value="350" step="1" class="w-full p-2 border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-100 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none font-mono transition-colors">
                        </div>
                        <div class="col-span-2">
                            <label class="block text-[11px] font-medium text-slate-500 dark:text-slate-400 mb-1">ตรรกะตรวจจับ (LOGIC)</label>
                            <select id="param-logic" class="w-full p-2 border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-100 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-colors">
                                <option value="0" selected>น้อยกว่า (<)</option>
                                <option value="1">มากกว่า (>)</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ================= พาเนลกลาง (6/12): พื้นที่จำลอง (Simulator) ================= -->
            <div class="lg:col-span-6 bg-white dark:bg-slate-800 p-6 sm:p-8 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 transition-colors flex flex-col items-center">
                <div class="mb-5 w-full flex justify-between items-center">
                    <h2 class="text-xl font-semibold text-slate-700 dark:text-slate-200">Simulator View</h2>
                    <button id="reset-btn" onclick="resetRobot()" class="text-sm flex items-center gap-1.5 px-4 py-2 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 disabled:opacity-50 transition-colors">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                        เริ่มใหม่
                    </button>
                </div>
                
                <div id="grid-container" class="grid gap-0 border-2 border-slate-300 dark:border-slate-600 bg-slate-100 dark:bg-slate-900/50 rounded-xl overflow-hidden w-full shadow-inner transition-colors">
                    <!-- ตารางจะถูกสร้างด้วย JavaScript -->
                </div>

                <div id="error-msg" class="hidden mt-4 p-3 w-full bg-red-100 dark:bg-red-900/40 text-red-700 dark:text-red-400 border border-red-200 dark:border-red-800/50 rounded-lg text-center font-medium text-sm transition-colors"></div>
                
                <!-- ปุ่มจำลอง (Simulate) -->
                <button id="run-btn" onclick="executeCommands()" class="w-full mt-6 flex items-center justify-center gap-2 p-4 bg-emerald-500 hover:bg-emerald-600 dark:bg-emerald-600 dark:hover:bg-emerald-700 text-white rounded-xl font-bold transition-all disabled:opacity-50 active:scale-95 shadow-sm text-lg">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"/></svg> 
                    จำลองบนกระดาน (Simulate)
                </button>
            </div>

            <!-- ================= พาเนลขวา (3/12): คิวคำสั่ง และ ส่งให้หุ่นยนต์จริง ================= -->
            <div class="lg:col-span-3 bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 transition-colors flex flex-col h-full min-h-[500px] max-h-[800px]">
                <div class="flex justify-between items-center mb-4 pb-2 border-b border-slate-100 dark:border-slate-700 transition-colors">
                    <h2 class="text-base font-semibold text-slate-700 dark:text-slate-200">ลำดับคำสั่ง (<span id="queue-count">0</span>)</h2>
                    <button id="clear-btn" onclick="clearCommands()" class="text-xs flex items-center gap-1 px-2.5 py-1.5 rounded-lg text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/30 disabled:opacity-50 transition-colors">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                        ล้างทั้งหมด
                    </button>
                </div>

                <div id="queue-list" class="flex-1 overflow-y-auto bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl p-3 mb-5 space-y-2 transition-colors">
                    <!-- รายการคำสั่งจะแสดงที่นี่ -->
                </div>

                <button id="send-btn" onclick="sendCommandsToRobot()" class="w-full mt-auto flex items-center justify-center gap-2 p-3.5 bg-indigo-500 hover:bg-indigo-600 dark:bg-indigo-600 dark:hover:bg-indigo-700 text-white rounded-xl font-bold transition-all disabled:opacity-50 active:scale-95 shadow-sm text-base">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9" rx="1"/><path d="M15 2v2"/><path d="M15 20v2"/><path d="M2 15h2"/><path d="M2 9h2"/><path d="M20 15h2"/><path d="M20 9h2"/><path d="M9 2v2"/><path d="M9 20v2"/></svg>
                    ส่งคำสั่งให้หุ่นยนต์จริง
                </button>
            </div>

        </div>
    </div>

    <!-- JavaScript ควบคุมการทำงานทั้งหมด -->
    <script>
        // === การจัดการ Dark Mode ===
        const htmlEl = document.documentElement;
        let isDarkMode = localStorage.getItem('theme') === 'dark';
        
        if (isDarkMode) htmlEl.classList.add('dark');

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            if (isDarkMode) {
                htmlEl.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            } else {
                htmlEl.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            }
            updateThemeIcon();
            render(); 
        }

        function updateThemeIcon() {
            const btn = document.getElementById('theme-toggle-btn');
            if (isDarkMode) {
                btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>`;
            } else {
                btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>`;
            }
        }
        updateThemeIcon();

        // === ค่าคงที่ของระบบ ===
        const GRID_COLS = 8;
        const GRID_ROWS = 4;
        const DELAY_MS = 500;
        const ROBOT_DELAY_MS = 1000; 
        const DIRECTIONS = { UP: 0, RIGHT: 90, DOWN: 180, LEFT: 270 };

        let robotState = { x: 0, y: GRID_ROWS - 1, dir: DIRECTIONS.UP, offset: 0 };
        let commandQueue = [];
        let droppedObjects = []; 
        let isExecuting = false;
        let currentStep = -1;
        let errorMsg = "";

        let serialPort;
        let serialWriter;
        let isConnected = false;

        const icons = {
            bot: `<svg width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="3" width="4" height="18" rx="1" fill="#e2e8f0"/>
                <path d="M2 7h4 M2 12h4 M2 17h4"/>
                <rect x="18" y="3" width="4" height="18" rx="1" fill="#e2e8f0"/>
                <path d="M18 7h4 M18 12h4 M18 17h4"/>
                <path d="M 8.5 6 L 8.5 1 L 15.5 1 L 15.5 6 Z" fill="#ccfbf1" stroke="#5eead4" stroke-width="1"/>
                <rect x="10.5" y="2" width="3" height="2.5" rx="0.5" fill="#14b8a6" stroke="none"/>
                <rect x="6" y="6" width="12" height="13" rx="2" fill="white"/>
            </svg>`,
            arrowUp: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>`,
            arrowDown: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg>`,
            rotateCcw: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>`,
            rotateCw: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>`,
            slideLeft: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>`,
            slideRight: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>`,
            checkWall: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16"/><path d="M12 2v16"/><path d="m8 14 4 4 4-4"/></svg>`,
            box: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>`
        };

        const cmdDictionary = {
            'FORWARD': { text: 'เดินหน้า', icon: icons.arrowUp, color: 'bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300 border-blue-300 dark:border-blue-800' },
            'BACKWARD': { text: 'ถอยหลัง', icon: icons.arrowDown, color: 'bg-orange-100 dark:bg-orange-900/40 text-orange-700 dark:text-orange-300 border-orange-300 dark:border-orange-800' },
            'TURN_LEFT': { text: 'หมุนซ้าย', icon: icons.rotateCcw, color: 'bg-purple-100 dark:bg-purple-900/40 text-purple-700 dark:text-purple-300 border-purple-300 dark:border-purple-800' },
            'TURN_RIGHT': { text: 'หมุนขวา', icon: icons.rotateCw, color: 'bg-pink-100 dark:bg-pink-900/40 text-pink-700 dark:text-pink-300 border-pink-300 dark:border-pink-800' },
            'SLIDE_LEFT': { text: 'สไลด์ซ้าย', icon: icons.slideLeft, color: 'bg-cyan-100 dark:bg-cyan-900/40 text-cyan-700 dark:text-cyan-300 border-cyan-300 dark:border-cyan-800' },
            'SLIDE_RIGHT': { text: 'สไลด์ขวา', icon: icons.slideRight, color: 'bg-sky-100 dark:bg-sky-900/40 text-sky-700 dark:text-sky-300 border-sky-300 dark:border-sky-800' },
            'CHECK_WALL': { text: 'เช็คกำแพง', icon: icons.checkWall, color: 'bg-amber-100 dark:bg-amber-900/40 text-amber-700 dark:text-amber-300 border-amber-300 dark:border-amber-800' },
            'DISPENSE': { text: 'จ่ายวัตถุ', icon: icons.box, color: 'bg-teal-100 dark:bg-teal-900/40 text-teal-700 dark:text-teal-300 border-teal-300 dark:border-teal-800' }
        };

        async function connectArduino() {
            if (!("serial" in navigator)) {
                showError("เบราว์เซอร์ของคุณไม่รองรับ Web Serial API");
                return;
            }
            try {
                serialPort = await navigator.serial.requestPort();
                await serialPort.open({ baudRate: 9600 });
                serialWriter = serialPort.writable.getWriter();
                isConnected = true;
                errorMsg = ""; 
                render();
            } catch (error) {
                showError("ไม่สามารถเชื่อมต่อได้");
            }
        }

        function showError(msg) {
            errorMsg = msg;
            render();
            setTimeout(() => {
                if(errorMsg === msg) {
                    errorMsg = "";
                    render();
                }
            }, 5000);
        }

        function render() {
            const gridEl = document.getElementById('grid-container');
            gridEl.style.gridTemplateColumns = `repeat(${GRID_COLS}, minmax(0, 1fr))`;
            gridEl.innerHTML = '';
            for (let row = 0; row < GRID_ROWS; row++) {
                for (let col = 0; col < GRID_COLS; col++) {
                    const cell = document.createElement('div');
                    if (col === 0 && row === GRID_ROWS - 1) {
                        cell.className = 'aspect-square border border-slate-300 dark:border-slate-700 bg-red-200 dark:bg-red-900/40 flex items-center justify-center relative transition-colors';
                        const startLabel = document.createElement('span');
                        startLabel.className = 'absolute bottom-1 sm:bottom-2 text-[10px] sm:text-xs font-bold text-red-700 dark:text-red-400';
                        startLabel.innerText = 'START';
                        cell.appendChild(startLabel);
                    } else {
                        cell.className = 'aspect-square border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 flex items-center justify-center relative transition-colors';
                    }
                    
                    droppedObjects.filter(obj => obj.x === col && obj.y === row).forEach(obj => {
                        const objDot = document.createElement('div');
                        objDot.className = 'absolute w-1/5 h-1/5 bg-teal-500 border border-teal-600 dark:border-teal-400 rounded-sm shadow-sm z-0 opacity-90';
                        if (obj.dir === 0) { objDot.style.top = '22%'; objDot.style.left = '50%'; }
                        else if (obj.dir === 90) { objDot.style.top = '50%'; objDot.style.left = '78%'; }
                        else if (obj.dir === 180) { objDot.style.top = '78%'; objDot.style.left = '50%'; }
                        else if (obj.dir === 270) { objDot.style.top = '50%'; objDot.style.left = '22%'; }
                        objDot.style.transform = 'translate(-50%, -50%)';
                        cell.appendChild(objDot);
                    });

                    if (robotState.x === col && robotState.y === row) {
                        const bot = document.createElement('div');
                        const offsetStyle = robotState.offset ? ` translateY(${robotState.offset}%)` : '';
                        bot.className = 'absolute w-2/3 h-2/3 transition-all duration-300 ease-in-out text-blue-600 dark:text-blue-400 drop-shadow-lg z-10 flex items-center justify-center';
                        bot.style.transform = `rotate(${robotState.dir}deg)${offsetStyle}`;
                        bot.innerHTML = icons.bot;
                        cell.appendChild(bot);
                    }
                    gridEl.appendChild(cell);
                }
            }

            const statusInd = document.getElementById('status-indicator');
            const statusTxt = document.getElementById('connection-status');
            const connectBtn = document.getElementById('connect-btn');
            
            if (isConnected) {
                statusInd.className = 'w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)] transition-colors';
                statusTxt.innerText = 'เชื่อมต่อแล้ว';
                statusTxt.className = 'text-sm font-medium text-emerald-600 dark:text-emerald-400 transition-colors';
                connectBtn.disabled = true;
            } else {
                statusInd.className = 'w-3 h-3 rounded-full bg-slate-300 dark:bg-slate-600 transition-colors';
                statusTxt.innerText = 'ยังไม่เชื่อมต่อ';
                statusTxt.className = 'text-sm font-medium text-slate-500 dark:text-slate-400 transition-colors';
                connectBtn.disabled = false;
            }

            const queueEl = document.getElementById('queue-list');
            document.getElementById('queue-count').innerText = commandQueue.length;

            if (commandQueue.length === 0) {
                queueEl.innerHTML = `<div class="h-full flex items-center justify-center text-slate-400 dark:text-slate-500 italic text-sm text-center">ยังไม่มีคำสั่ง</div>`;
            } else {
                queueEl.innerHTML = commandQueue.map((cmd, index) => {
                    const style = cmdDictionary[cmd];
                    const isActive = currentStep === index;
                    const activeClass = isActive ? 'ring-2 ring-offset-1 dark:ring-offset-slate-800 ring-blue-500 scale-[1.02] shadow-sm' : 'opacity-90';
                    return `
                        <div class="flex items-center gap-2 p-2.5 rounded-lg border transition-all text-sm ${style.color} ${activeClass}">
                            <span class="font-mono text-xs font-bold bg-white/50 dark:bg-slate-900/50 px-2 py-0.5 rounded w-8 text-center shrink-0">${index + 1}</span>
                            <div class="shrink-0">${style.icon}</div>
                            <span class="font-medium">${style.text}</span>
                            <div class="ml-auto flex items-center gap-2">
                                ${isActive ? '<span class="text-[10px] animate-pulse font-medium">ทำงาน...</span>' : ''}
                                ${!isExecuting ? `<button onclick="removeCommand(${index})" class="text-slate-400 dark:text-slate-500 hover:text-red-500 dark:hover:text-red-400 hover:bg-white/60 dark:hover:bg-slate-700 p-1 rounded-md transition-colors"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
            }

            const errorEl = document.getElementById('error-msg');
            if (errorMsg) { errorEl.innerText = errorMsg; errorEl.classList.remove('hidden'); } 
            else { errorEl.classList.add('hidden'); }

            document.querySelectorAll('.cmd-btn').forEach(btn => btn.disabled = isExecuting);
            document.getElementById('reset-btn').disabled = isExecuting;
            document.getElementById('clear-btn').disabled = isExecuting || commandQueue.length === 0;
            
            const params = ['f', 'b', 'l', 'r', 'sl', 'sr', 'cw', 'light', 'logic'];
            params.forEach(p => document.getElementById('param-' + p).disabled = isExecuting);
            
            const runBtn = document.getElementById('run-btn');
            runBtn.disabled = isExecuting || commandQueue.length === 0;
            runBtn.innerHTML = isExecuting ? `กำลังทำงาน...` : `<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg> จำลองบนกระดาน (Simulate)`;

            const sendBtn = document.getElementById('send-btn');
            sendBtn.disabled = isExecuting || commandQueue.length === 0 || !isConnected;
        }

        function addCommand(cmd) {
            if (isExecuting) return;
            commandQueue.push(cmd);
            render();
        }

        function removeCommand(index) {
            if (isExecuting) return;
            commandQueue.splice(index, 1);
            render();
        }

        function clearCommands() {
            if (isExecuting) return;
            commandQueue = [];
            currentStep = -1;
            droppedObjects = [];
            render();
        }

        function resetRobot() {
            if (isExecuting) return;
            robotState = { x: 0, y: GRID_ROWS - 1, dir: DIRECTIONS.UP, offset: 0 };
            currentStep = -1;
            droppedObjects = [];
            render();
        }

        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        async function executeCommands() {
            if (commandQueue.length === 0 || isExecuting) return;
            isExecuting = true;
            currentStep = -1;
            droppedObjects = []; 
            render();

            for (let i = 0; i < commandQueue.length; i++) {
                currentStep = i;
                render(); 
                const cmd = commandQueue[i];
                let { x, y, dir } = robotState;

                if (cmd === 'FORWARD') {
                    if (dir === DIRECTIONS.UP) y -= 1; else if (dir === DIRECTIONS.RIGHT) x += 1; else if (dir === DIRECTIONS.DOWN) y += 1; else x -= 1;
                } else if (cmd === 'BACKWARD') {
                    if (dir === DIRECTIONS.UP) y += 1; else if (dir === DIRECTIONS.RIGHT) x -= 1; else if (dir === DIRECTIONS.DOWN) y -= 1; else x += 1;
                } else if (cmd === 'TURN_LEFT') dir = (dir - 90 + 360) % 360;
                else if (cmd === 'TURN_RIGHT') dir = (dir + 90) % 360;
                else if (cmd === 'SLIDE_LEFT') {
                    if (dir === DIRECTIONS.UP) x -= 1; else if (dir === DIRECTIONS.RIGHT) y -= 1; else if (dir === DIRECTIONS.DOWN) x += 1; else y += 1;
                } else if (cmd === 'SLIDE_RIGHT') {
                    if (dir === DIRECTIONS.UP) x += 1; else if (dir === DIRECTIONS.RIGHT) y += 1; else if (dir === DIRECTIONS.DOWN) x -= 1; else y -= 1;
                } else if (cmd === 'DISPENSE') droppedObjects.push({ x, y, dir });
                else if (cmd === 'CHECK_WALL') { robotState.offset = 40; render(); await sleep(DELAY_MS); robotState.offset = 0; }

                if (x < 0 || x >= GRID_COLS || y < 0 || y >= GRID_ROWS) {
                    showError("ระวัง! หุ่นยนต์ชนขอบพื้นที่");
                    isExecuting = false;
                    render();
                    return; 
                }
                robotState = { x, y, dir, offset: robotState.offset || 0 };
                render(); 
                await sleep(DELAY_MS);
            }
            currentStep = -1;
            isExecuting = false;
            render();
        }

        async function sendCommandsToRobot() {
            if (commandQueue.length === 0 || isExecuting || !isConnected || !serialWriter) return;
            isExecuting = true;
            currentStep = -1;
            droppedObjects = []; 
            render();

            const textEncoder = new TextEncoder();
            const getVal = (id) => document.getElementById(id).value;

            try {
                for (let i = 0; i < commandQueue.length; i++) {
                    currentStep = i;
                    const cmd = commandQueue[i];
                    let commandToSend = '';

                    if (cmd === 'FORWARD') commandToSend = `F${getVal('param-f')}\n`;
                    else if (cmd === 'BACKWARD') commandToSend = `B${getVal('param-b')}\n`;
                    else if (cmd === 'TURN_LEFT') commandToSend = `L${getVal('param-l')}\n`;
                    else if (cmd === 'TURN_RIGHT') commandToSend = `R${getVal('param-r')}\n`;
                    else if (cmd === 'SLIDE_LEFT') commandToSend = `SL${getVal('param-sl')}\n`;
                    else if (cmd === 'SLIDE_RIGHT') commandToSend = `SR${getVal('param-sr')}\n`;
                    else if (cmd === 'CHECK_WALL') {
                        // ส่ง CW พร้อมพารามิเตอร์ ค่าแสง และ ตรรกะ
                        commandToSend = `CW${getVal('param-cw')},${getVal('param-light')},${getVal('param-logic')}\n`;
                    }
                    else if (cmd === 'DISPENSE') { commandToSend = `D\n`; droppedObjects.push({ x: robotState.x, y: robotState.y, dir: robotState.dir }); }

                    if (cmd !== 'DISPENSE' && cmd !== 'CHECK_WALL') {
                        let { x, y, dir } = robotState;
                        if (cmd === 'FORWARD') { if (dir === 0) y--; else if (dir === 90) x++; else if (dir === 180) y++; else x--; }
                        else if (cmd === 'BACKWARD') { if (dir === 0) y++; else if (dir === 90) x--; else if (dir === 180) y--; else x++; }
                        else if (cmd === 'TURN_LEFT') dir = (dir - 90 + 360) % 360;
                        else if (cmd === 'TURN_RIGHT') dir = (dir + 90) % 360;
                        else if (cmd === 'SLIDE_LEFT') { if (dir === 0) x--; else if (dir === 90) y--; else if (dir === 180) x++; else y++; }
                        else if (cmd === 'SLIDE_RIGHT') { if (dir === 0) x++; else if (dir === 90) y++; else if (dir === 180) x--; else y--; }
                        robotState = { x, y, dir, offset: 0 };
                    }
                    render();
                    await serialWriter.write(textEncoder.encode(commandToSend));
                    await sleep(ROBOT_DELAY_MS);
                }
            } catch (error) {
                showError("เกิดข้อผิดพลาดในการส่งข้อมูล");
                isConnected = false;
            } finally {
                currentStep = -1;
                isExecuting = false;
                render();
            }
        }
        render();
    </script>
</body>
</html>
